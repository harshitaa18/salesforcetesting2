<template>
    <lightning-card title="✨ Quick Account Wizard" icon-name="standard:account">
        <div class="slds-p-around_medium">
            <div class="slds-m-bottom_small">
                <lightning-input label="Account Name" data-id="accName" required></lightning-input>
            </div>
            <div class="slds-m-bottom_small">
                <lightning-input type="tel" label="Phone Number" data-id="acPhone"></lightning-input>
            </div>
            
            <div class="slds-align_absolute-center slds-m-top_medium">
                <!-- This is the busstton Kamikazeee will interact with -->
                 <!--try tttttttttttttttthjhf4huuuhuhfuhhjfhjhjfhj3hd3hjdhjejhjfhbdhhhdjdjhbjyuyuyyuyuuhhbhbhbbehfjthis-->
                <lightning-button 
                    variant="brand" 
                    label="Createe Account" 
                    title="Create Account" 
                    onclick={handleCreate}
                    class="create-btn">
                </lightning-button>
            </div>

            <template if:true={message}>
                <div class="slds-m-slds-text-color_success slds-align_absolute-center">
                    {message}
                </div>
            </template>
        </div>
    </lightning-card>
</template>
